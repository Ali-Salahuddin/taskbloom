frontend:
  image:
    repository: alisalahuddin/taskbloom-frontend
    tag: latest
  replicas: 2
  service:
    port: 80

backend:
  image:
    repository: alisalahuddin/taskbloom-backend
    tag: latest
  replicas: 2
  service:
    port: 5000

ingress:
  enabled: true
  className: nginx
  host: taskbloom.local
  path: /
  pathType: Prefix